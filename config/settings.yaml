# ──────────────────────────────────────────────────────────
# STRATEGY PARAMETERS
# ──────────────────────────────────────────────────────────
strategy:
  name: "FIB"

  timeframes:
    entry: "5m"
    regime: "15m"
    trend: "1h"

  # Fibonacci strategy
  # mode can be: reversal, trend_pullback, confluence
  fibonacci:
    mode: "trend_pullback"
    swing_lookback: 96
    max_swing_age: 48
    min_impulse_atr: 2.0
    min_impulse_pct: 0.4
    reversal_extensions: [1.272, 1.618]
    pullback_retracements: [0.5, 0.618]
    exit_mode: "fixed_pnl"
    fixed_margin_usdt: 12.5
    fixed_leverage: 20
    stop_loss_usdt: 10.0
    take_profit_usdt: 15.0
    pullback_take_profit_retracement: 0.236
    shallow_entry_stop_level: 0.618
    deep_entry_stop_level: 0.786
    reversal_take_profit_retracement: 0.618
    zone_tolerance_pct: 0.12
    enter_on_zone_touch: true
    max_entry_zone_touches: 2
    dca_enabled: false
    dca_from_level: 0.5
    dca_to_level: 0.618
    dca_max_legs: 2
    dca_max_total_loss_usdt: 5.0
    dca_reward_usdt: 5.0
    early_zone_touch_bonus: 1
    quality_filters:
      enabled: true
      strong_regimes: ["VOLATILE", "SQUEEZE"]
      min_adx: 20.0
      rsi_min: 35.0
      rsi_max: 75.0
      require_early_touch: false
      require_confirmation_below_score: 7
    deep_zone_trend_bypass_level: 0.618
    deep_zone_trend_bypass_pct: 0.6
    zone_cooldown_minutes: 15
    block_zone_after_loss: true
    volume_ratio_min: 1.2
    require_confirmation: false
    require_volume: false
    trend_filter: true
    avoid_dead_regime: true
    divergence_lookback: 24
    stop_atr_buffer: 0.35
    min_stop_pct: 0.2
    fallback_rr: 1.5

  # Layer 1: Regime Detection
  regime:
    adx_period: 14
    bb_period: 20
    bb_std_dev: 2.0
    bb_width_lookback: 100
    thresholds:
      trending_adx: 25
      ranging_adx: 20
      dead_adx: 15
      squeeze_bb_percentile: 20
      volatile_bb_percentile: 80
      volatile_adx: 30

  # Layer 2: Trend Direction
  trend:
    ema_slow_period: 200
    ema_fast_period: 50

  # Layer 3: RSI Divergence
  divergence:
    rsi_period: 7
    oversold_threshold: 35
    overbought_threshold: 65
    swing_lookback: 14
    min_swing_distance: 3

  # Layer 4: Level Confluence
  levels:
    vwap_enabled: true
    ema_50_5m_enabled: true
    prev_session_levels: true
    proximity_pct: 0.30

  # Layer 5: Volume
  volume:
    sma_period: 20
    spike_multiplier: 1.5
    strong_spike_multiplier: 2.0

  # Layer 5b: Candle Patterns
  candles:
    engulfing_enabled: true
    hammer_enabled: true
    shooting_star_enabled: true
    body_to_wick_ratio: 2.0

  # Signal Scoring
  scoring:
    min_score: 4
    a_plus_threshold: 11
    a_threshold: 9
    b_threshold: 4
    b_size_multiplier: 0.75

# ──────────────────────────────────────────────────────────
# COIN SCREENING (Dynamic Scanner)
# ──────────────────────────────────────────────────────────
screening:
  mode: "dynamic"

  dynamic:
    scan_pool: "all"
    rescreen_interval_hours: 4
    max_active_coins: 100
    atr_scan_limit: 20
    rest_atr_prefilter_enabled: false

    filters:
      min_24h_volume: 50000000
      max_spread_pct: 0.05
      min_atr_pct: 0.15
      max_atr_pct: 5.0
      min_price: 0.001
      quote_currency: "USDT"
      contract_type: "PERPETUAL"

    ranking:
      volatility_weight: 0.4
      volume_weight: 0.4
      spread_weight: 0.2

  blacklist:
    - "1000SHIBUSDT"
    - "1000PEPEUSDT"
    - "USDCUSDT"
    - "FDUSDUSDT"

  whitelist:
    - "BTCUSDT"
    - "ETHUSDT"

# ──────────────────────────────────────────────────────────
# MARKET DATA
# ──────────────────────────────────────────────────────────
market_data:
  # Phase 2 adds websocket candle infrastructure behind this flag. The bot still
  # uses REST candles until Phase 3/4 wiring is complete.
  mode: "websocket"  # rest | websocket

  websocket:
    enabled: true
    timeframes: ["5m", "15m", "1h"]
    mark_price_enabled: true
    mark_price_interval: "1s"
    max_streams_per_connection: 50
    reconnect_base_delay_seconds: 5
    reconnect_max_delay_seconds: 120

  position_monitor:
    reconcile_interval_seconds: 300

  rest_bootstrap:
    enabled: false
    batch_size: 1
    delay_seconds: 5.0
    retry_interval_seconds: 1800
    cooldown_after_418_minutes: 10

# ──────────────────────────────────────────────────────────
# ENTRY & EXIT
# ──────────────────────────────────────────────────────────
execution:
  order_type: "limit"
  limit_price_buffer_pct: 0.02
  order_timeout_candles: 3

  portfolio_take_profit:
    enabled: true
    mode: "net"
    target_usdt: 20.0
    estimated_round_trip_fee_rate: 0.0008

  stop_loss:
    method: "atr"
    atr_multiplier: 1.5
    atr_period: 14
    max_stop_pct: 2.0
    min_stop_pct: 0.2

  take_profit:
    rr_ratio: 2.0
    min_rr_ratio: 2.0

  trailing:
    enabled: false
    activate_at_rr: 1.5
    breakeven_at_rr: 0.7
    breakeven_buffer_pct: 0.05
    trail_by_atr: true
    trail_atr_multiplier: 1.0

  time_stop:
    enabled: false
    max_bars: 15
    min_move_pct: 0.3

# ──────────────────────────────────────────────────────────
# RISK MANAGEMENT
# ──────────────────────────────────────────────────────────
risk:
  position:
    sizing_mode: "fixed_margin"
    fixed_margin_usdt: 12.5
    fixed_leverage: 20
    risk_per_trade_pct: 0.5
    max_margin_pct: 10.0
    min_order_value: 5.0

  leverage:
    base: 20
    min: 20
    max: 20
    dynamic: false

  limits:
    max_open_positions: 0  # 0 or lower = unlimited
    max_daily_trades: 0
    max_same_direction: 0

  circuit_breakers:
    daily_loss:
      enabled: true
      max_loss_pct: 6.0
      reset_time_utc: "00:00"

    drawdown:
      enabled: true
      max_drawdown_pct: 20.0
      auto_resume: false

    consecutive_losses:
      enabled: true
      max_consecutive: 4
      cooldown_minutes: 120

  margin_type: "ISOLATED"

  correlation:
    enabled: true
    groups:
      btc: ["BTCUSDT"]
      eth: ["ETHUSDT"]
      alt_l1: ["SOLUSDT", "SUIUSDT"]
      meme: ["DOGEUSDT", "PEPEUSDT"]

# ──────────────────────────────────────────────────────────
# NOTIFICATIONS
# ──────────────────────────────────────────────────────────
notifications:
  telegram:
    enabled: true
    messages:
      signal_detected: true
      position_opened: true
      position_closed: true
      stop_moved: false
      daily_summary: true
      circuit_breaker: true
      error_alert: true
      heartbeat: true
    heartbeat_interval_minutes: 60
    daily_summary_time_utc: "23:59"

# ──────────────────────────────────────────────────────────
# LOGGING
# ──────────────────────────────────────────────────────────
logging:
  level: "INFO"
  console: true
  file:
    enabled: true
    path: "logs/"
    rotation: "10 MB"
    retention: "30 days"

# ──────────────────────────────────────────────────────────
# DATABASE
# ──────────────────────────────────────────────────────────
database:
  path: "data/fib.db"
  backup:
    enabled: true
    interval_hours: 24
    max_backups: 7
    path: "data/backups/"

# ──────────────────────────────────────────────────────────
# DASHBOARD — CLOSED TRADE HISTORY
# ──────────────────────────────────────────────────────────
dashboard:
  enabled: true
  host: "127.0.0.1"
  port: 8090
  database_path: "data/fib.db"
  refresh_seconds: 30
  default_range: "all"
